name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: FileIntegrityChecker_windows.exe
          - os: ubuntu-latest
            output_name: FileIntegrityChecker_linux
          - os: macos-latest
            output_name: FileIntegrityChecker_macos

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow

    - name: Build with PyInstaller
      run: |
        pyinstaller integrity_gui.spec

    - name: Rename executable for release
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          mv dist/integrity_gui.exe dist/${{ matrix.output_name }}
        else
          mv dist/integrity_gui dist/${{ matrix.output_name }}
        fi
      shell: bash

    - name: Upload artifacts (for debugging)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-executable
        path: dist/${{ matrix.output_name }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}