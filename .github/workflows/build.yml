name: Build Executables

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: FileIntegrityChecker_windows.exe
          - os: ubuntu-latest
            output_name: FileIntegrityChecker_linux
          - os: macos-latest
            output_name: FileIntegrityChecker_macos

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow

    - name: Build with PyInstaller using spec file
      run: |
        pyinstaller integrity_gui.spec

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-executable
        path: dist/integrity_gui${{ matrix.os == 'windows-latest' && '.exe' || '' }}